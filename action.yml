name: Jekyll Redirects for Cloudflare
description: Converts a "jekyll-redirect-from" redirect ruleset into one that works on Cloudflare
author: SocksTheWolf

branding:
  icon: arrow-right
  color: green

inputs:
  outputPath:
    description: Your Jekyll build output folder, if you have modified the folder name/path from the default
    default: '_site'
  deleteRedirectsJson:
    description: Deletes the generated redirects.json file that Jekyll makes after converting it
    default: true

outputs:
  success:
    description: Outputs if the _redirects was created/updated successfully

runs:
  using: node24
  main: dist/index.js
